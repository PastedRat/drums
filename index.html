<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRUMS FM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="page-bg"></div>

    <header class="topbar">
      <button class="menu-toggle ui-button" id="menuToggle" type="button">▸▸ Menu</button>
      <div class="station-meta">
        <span class="disc"></span>
        <span>Cxdy FM</span>
      </div>
      <div class="transport">
        <button class="transport-btn" id="prevBtn" type="button" aria-label="Previous">◁</button>
        <button class="transport-btn" id="playBtn" type="button" aria-label="Play">▷</button>
        <button class="transport-btn" id="nextBtn" type="button" aria-label="Next">▷|</button>
      </div>
      <div class="track-indicator" id="trackIndicator">• Track #1</div>
      <div class="corner-logo">DRMS</div>
    </header>

    <main class="stage">
      <section class="tv-shell">
        <div class="tv-frame">
          <div class="tv-screen">
            <div class="scanlines"></div>

            <div class="screen screen-menu active" id="screenMenu">
              <p class="screen-label">Menu</p>
              <div class="menu-list" id="kitList"></div>
            </div>

            <div class="screen screen-beats" id="screenBeats">
              <p class="screen-label" id="beatsLabel">Beats</p>
              <div class="beats-panel">
                <button class="back-link" id="backToMenu" type="button">← Back to menu</button>
                <div class="beats-list" id="beatsList"></div>
              </div>
            </div>

            <div class="screen screen-signup" id="screenSignup">
              <p class="screen-label">Free stash kit</p>
              <div class="signup-copy">
                <h1>Grab My NEW 2026 Free Stash Kit</h1>
                <form class="signup-form">
                  <input type="text" placeholder="First Name" aria-label="First Name" />
                  <input type="email" placeholder="Email Address" aria-label="Email Address" />
                  <button type="submit">Get Sounds</button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <button class="base-button" id="baseButton" type="button">Open free stash kit</button>
      </section>
    </main>

    <template id="kitButtonTemplate">
      <button class="menu-item" type="button"></button>
    </template>

    <template id="beatButtonTemplate">
      <a class="beat-link" target="_blank" rel="noopener noreferrer"></a>
    </template>

    <script src="script.js"></script>
  </body>
</html>
